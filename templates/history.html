<!DOCTYPE html>
<html>
<head>
    <title>Career Lens - History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/recommend.css') }}">

    <style>
        h2 {
            text-align: center;
            margin-top: 30px;
            color: #16add3;
        }

        table {
            width: 95%;
            margin: 30px auto;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 14px;
        }

        td {
            padding: 12px;
            text-align: center;
            color: #2c3e50;
            font-weight: 500;
        }

        tr:nth-child(even) {
            background-color: #f4f6f8;
        }

        tr:hover {
            background-color: #e6f7ff;
        }

        .delete-btn {
            padding: 6px 12px;
            background-color: #e74c3c;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background-color: #c0392b;
        }

        .back-btn {
            display: inline-block;
            margin: 20px;
            padding: 8px 15px;
            background-color: #1abc9c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }

        .back-btn:hover {
            background-color: #16a085;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/recommend" class="back-btn">⬅ Back to Recommendation</a>

    <h2>📊 Recent Recommendation History</h2>

    <table>
        <tr>
            <th>Branch</th>
            <th>Career</th>
            <th>Company Type</th>
            <th>Date & Time</th>
            <th>Action</th>
        </tr>

        {% if records %}
            {% for record in records %}
            <tr>
                <td>{{ record[1] }}</td>
                <td>{{ record[2] }}</td>
                <td>{{ record[3] }}</td>
                <td>{{ record[4] }}</td>
                <td>
                    <a href="/delete/{{ record[0] }}" 
                       class="delete-btn"
                       onclick="return confirm('Are you sure you want to delete this record?');">
                       Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="5">No history available yet.</td>
            </tr>
        {% endif %}
    </table>

</div>

</body>
</html>
